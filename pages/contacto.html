<section class="page-header">
  <h1>Contacto</h1>

<section class="container py-5 contacto-section">
  <div class="row g-4 align-items-center">
    <div class="col-md-5 contacto-info">
      <h2>Contactanos</h2>
      <p>Consultá disponibilidad y prepará tu próxima escapada a Bosque Alto.</p>

      <p><strong>WhatsApp:</strong> +54 9 11 1234-5678</p>
      <p><strong>Email:</strong> reservas@bosquealto.com</p>
      <p><strong>Ubicación:</strong> Córdoba, Argentina</p>
      <p><strong>Horario:</strong> Todos los días de 9 a 20 hs</p>
    </div>

    <div class="col-md-7">
      <form class="contacto-form">
        <input class="form-control mb-3" type="text" placeholder="Nombre completo">
        <input class="form-control mb-3" type="email" placeholder="Email">
        <input class="form-control mb-3" type="tel" placeholder="Teléfono">

        <div class="row">
          <div class="col-md-6">
            <input class="form-control mb-3" type="date">
          </div>
          <div class="col-md-6">
            <input class="form-control mb-3" type="date">
          </div>
        </div>

        <input class="form-control mb-3" type="number" placeholder="Cantidad de personas">
        <textarea class="form-control mb-3" rows="5" placeholder="Mensaje"></textarea>
        <button class="btn btn-custom" type="submit">Enviar consulta</button>
      </form>
    </div>
  </div>
</section>
